# Только домен lotopredict — без default_server и без IP сервера
server {
    listen 80;
    listen [::]:80;
    server_name zzzzzzz.tw1.ru;

    root /var/www/lotopredict/public;
    index index.php;

    access_log /var/log/nginx/lotopredict_access.log;
    error_log  /var/log/nginx/lotopredict_error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    client_max_body_size 8m;
}
